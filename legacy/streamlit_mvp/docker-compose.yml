services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEWSCAST_STORAGE_ROOT: /app/storage
      PYTHONDONTWRITEBYTECODE: "1"
    volumes:
      - ./data:/app/data
      - ./storage:/app/storage
      - ./backups:/app/backups
    expose:
      - "8501"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8501/_stcore/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 25s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy/logs/nginx:/var/log/nginx
