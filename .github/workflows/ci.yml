name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend:
    name: Backend Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Compile backend sources
        run: python -m compileall backend/app backend/migrations/versions

      - name: Smoke-test backend bootstrap on SQLite
        env:
          DATABASE_URL: sqlite:////tmp/newscast-ci.db
          AUTO_CREATE_SCHEMA: "true"
          SEED_DEMO_DATA: "true"
          STORAGE_ROOT: /tmp/newscast-storage
          SESSION_SECRET: ci-smoke-secret
        working-directory: backend
        run: |
          mkdir -p /tmp/newscast-storage
          python -c "from app.services.bootstrap import initialize_schema_and_seed; initialize_schema_and_seed(); print('backend smoke ok')"

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

