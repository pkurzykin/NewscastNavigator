name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend:
    name: Backend Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-dev.txt

      - name: Compile backend sources
        run: python -m compileall backend/app backend/migrations/versions

      - name: Smoke-test backend bootstrap on SQLite
        env:
          DATABASE_URL: sqlite:////tmp/newscast-ci.db
          SEED_DEMO_DATA: "true"
          CORS_ORIGINS: http://127.0.0.1:5173,http://localhost:5173
          STORAGE_ROOT: /tmp/newscast-storage
          EXPORT_PATH: /tmp/newscast-exports
          SESSION_SECRET: ci-smoke-secret
        working-directory: backend
        run: |
          mkdir -p /tmp/newscast-storage
          mkdir -p /tmp/newscast-exports
          python scripts/bootstrap_runtime.py
          python -c "print('backend smoke ok')"

      - name: Run backend API smoke tests
        working-directory: backend
        run: pytest -q

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
