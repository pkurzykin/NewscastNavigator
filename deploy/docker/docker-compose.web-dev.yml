name: newscast_web_dev

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ../env/web-dev.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - web_pg_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 10s

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../env/web-dev.env
    environment:
      WATCHFILES_FORCE_POLLING: "true"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python scripts/bootstrap_runtime.py &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ../../backend:/app
      - web_storage:/app/storage
      - web_exports:/app/exports
    ports:
      - "${BACKEND_PORT:-8100}:8000"

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../env/web-dev.env
    environment:
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - backend
    volumes:
      - ../../frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"

volumes:
  frontend_node_modules:
  web_pg_data:
  web_storage:
  web_exports:
